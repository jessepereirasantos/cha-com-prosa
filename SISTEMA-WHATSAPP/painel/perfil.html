<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eloha Bots - Meu Perfil</title>
  <link rel="stylesheet" href="css/style.css?v=20260305c" />
</head>
<body>
  <div data-shell></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    ensureAuthed();

    (async function() {
      await mountShell({ title: 'Meu Perfil' });
      await render();
    })();

    async function render() {
      const content = document.querySelector('[data-shell-content]');
      content.innerHTML = `
        <div class="grid">
          <div class="card" style="grid-column: span 6;">
            <div class="card-h">
              <div>
                <p class="h2">👤 Informações Pessoais</p>
                <p class="p">Atualize seus dados de perfil</p>
              </div>
            </div>
            <div class="card-b">
              <div class="form-group">
                <label class="label">Nome</label>
                <input type="text" class="input" id="inputName" placeholder="Seu nome" />
              </div>
              <div class="form-group">
                <label class="label">Email</label>
                <input type="email" class="input" id="inputEmail" disabled />
              </div>
              <div style="margin-top: 16px;">
                <button class="btn primary" id="btnSaveProfile">Salvar Alterações</button>
              </div>
            </div>
          </div>

          <div class="card" style="grid-column: span 6;">
            <div class="card-h">
              <div>
                <p class="h2">🔒 Alterar Senha</p>
                <p class="p">Mantenha sua conta segura</p>
              </div>
            </div>
            <div class="card-b">
              <div class="form-group">
                <label class="label">Senha Atual</label>
                <input type="password" class="input" id="inputCurrentPassword" placeholder="Digite sua senha atual" />
              </div>
              <div class="form-group">
                <label class="label">Nova Senha</label>
                <input type="password" class="input" id="inputNewPassword" placeholder="Digite a nova senha" />
              </div>
              <div class="form-group">
                <label class="label">Confirmar Nova Senha</label>
                <input type="password" class="input" id="inputConfirmPassword" placeholder="Confirme a nova senha" />
              </div>
              <div style="margin-top: 16px;">
                <button class="btn primary" id="btnChangePassword">Alterar Senha</button>
              </div>
            </div>
          </div>

          <div class="card" style="grid-column: span 12;">
            <div class="card-h">
              <div>
                <p class="h2">📋 Informações da Conta</p>
              </div>
            </div>
            <div class="card-b">
              <div class="row" style="gap: 24px; flex-wrap: wrap;">
                <div>
                  <p class="p" style="color: var(--muted); font-size: 12px;">Membro desde</p>
                  <p class="h3" id="memberSince">-</p>
                </div>
                <div>
                  <p class="p" style="color: var(--muted); font-size: 12px;">Plano atual</p>
                  <p class="h3" id="currentPlan">-</p>
                </div>
                <div>
                  <p class="p" style="color: var(--muted); font-size: 12px;">Status</p>
                  <p class="h3" id="accountStatus">-</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('btnSaveProfile').addEventListener('click', saveProfile);
      document.getElementById('btnChangePassword').addEventListener('click', changePassword);

      await loadProfile();
    }

    async function loadProfile() {
      try {
        const res = await apiFetch('/api/auth/me');
        
        document.getElementById('inputEmail').value = res.email || '';
        document.getElementById('inputName').value = res.name || '';
        
        if (res.created_at) {
          const date = new Date(res.created_at);
          document.getElementById('memberSince').textContent = date.toLocaleDateString('pt-BR');
        }

        // Carregar informações do plano
        try {
          const subRes = await apiFetch('/api/subscriptions/my');
          if (subRes.subscription) {
            document.getElementById('currentPlan').textContent = subRes.subscription.plan_name || 'Plano Ativo';
            document.getElementById('accountStatus').innerHTML = '<span style="color: #00ff88;">✓ Ativo</span>';
          } else {
            document.getElementById('currentPlan').textContent = 'Sem plano';
            document.getElementById('accountStatus').innerHTML = '<span style="color: var(--muted);">Inativo</span>';
          }
        } catch (e) {
          document.getElementById('currentPlan').textContent = 'Sem plano';
          document.getElementById('accountStatus').innerHTML = '<span style="color: var(--muted);">Inativo</span>';
        }

      } catch (error) {
        toast({ title: 'Erro', message: 'Falha ao carregar perfil', type: 'danger' });
      }
    }

    async function saveProfile() {
      const name = document.getElementById('inputName').value.trim();
      
      if (!name) {
        toast({ title: 'Atenção', message: 'Informe seu nome', type: 'warning' });
        return;
      }

      try {
        await apiFetch('/api/profile', {
          method: 'PUT',
          body: { name }
        });
        toast({ title: 'Sucesso', message: 'Perfil atualizado!', type: 'success' });
      } catch (error) {
        toast({ title: 'Erro', message: error.message || 'Falha ao atualizar perfil', type: 'danger' });
      }
    }

    async function changePassword() {
      const currentPassword = document.getElementById('inputCurrentPassword').value;
      const newPassword = document.getElementById('inputNewPassword').value;
      const confirmPassword = document.getElementById('inputConfirmPassword').value;

      if (!currentPassword || !newPassword || !confirmPassword) {
        toast({ title: 'Atenção', message: 'Preencha todos os campos', type: 'warning' });
        return;
      }

      if (newPassword !== confirmPassword) {
        toast({ title: 'Atenção', message: 'As senhas não conferem', type: 'warning' });
        return;
      }

      if (newPassword.length < 6) {
        toast({ title: 'Atenção', message: 'A senha deve ter pelo menos 6 caracteres', type: 'warning' });
        return;
      }

      try {
        await apiFetch('/api/profile/password', {
          method: 'PUT',
          body: { 
            current_password: currentPassword,
            new_password: newPassword 
          }
        });
        toast({ title: 'Sucesso', message: 'Senha alterada com sucesso!', type: 'success' });
        
        document.getElementById('inputCurrentPassword').value = '';
        document.getElementById('inputNewPassword').value = '';
        document.getElementById('inputConfirmPassword').value = '';
      } catch (error) {
        toast({ title: 'Erro', message: error.message || 'Falha ao alterar senha', type: 'danger' });
      }
    }
  </script>
</body>
</html>
