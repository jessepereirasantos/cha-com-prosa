<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eloha Bots - Automação Inteligente para WhatsApp</title>
  <link rel="stylesheet" href="css/style.css?v=20260305b" />
  <style>
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, rgba(109, 94, 252, 0.1), rgba(12, 18, 36, 0.9));
      border-radius: 0 0 50px 50px;
      margin-bottom: 60px;
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.25rem;
      color: var(--muted);
      max-width: 700px;
      margin: 0 auto 40px;
    }
    .plans-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }
    .plan-card {
      background: rgba(12, 18, 36, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
    }
    .plan-card:hover {
      border-color: #00d4ff;
      transform: translateY(-10px);
    }
    .plan-card.featured {
      border-color: #00ff88;
      box-shadow: 0 20px 40px rgba(0, 255, 136, 0.1);
    }
    .plan-card.featured::before {
      content: 'MAIS POPULAR';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      background: #00ff88;
      color: #000;
      padding: 5px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .plan-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
    .plan-price { font-size: 3rem; font-weight: 800; color: #00d4ff; margin-bottom: 20px; }
    .plan-price span { font-size: 1rem; color: var(--muted); font-weight: 400; }
    .plan-features { list-style: none; padding: 0; margin-bottom: 30px; text-align: left; }
    .plan-features li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--muted); }
    .plan-features li::before { content: '✓'; color: #00ff88; margin-right: 10px; font-weight: 700; }
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(12, 18, 36, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: #00d4ff; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="home.html" class="logo">Eloha<span>Bots</span></a>
    <div>
      <a href="index.html" class="btn small">Acessar Painel</a>
      <a href="checkout.html" class="btn small primary">Começar Agora</a>
    </div>
  </nav>

  <header class="hero">
    <h1>Venda mais com o <br>WhatsApp Automatizado</h1>
    <p>Crie fluxos de conversa inteligentes, gerencie múltiplas instâncias e transforme seu atendimento em uma máquina de vendas.</p>
    <div style="display: flex; gap: 15px; justify-content: center;">
      <a href="checkout.html" class="btn primary btn-lg">Ver Planos</a>
      <a href="index.html" class="btn btn-lg" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Acessar Painel</a>
    </div>
  </header>

  <div class="plans-container">
    <div id="plansList" class="plans-grid">
      <!-- Carregado via API -->
    </div>
  </div>

  <footer style="text-align: center; padding: 40px; color: var(--muted);">
    <p>&copy; 2026 Eloha Bots. Todos os direitos reservados.</p>
  </footer>

  <script src="js/api.js"></script>
  <script>
    async function loadHomePlans() {
      try {
        const res = await apiFetch('/api/plans', { auth: false });
        const plans = res.plans || [];
        const container = document.getElementById('plansList');
        
        container.innerHTML = plans.map((plan, idx) => `
          <div class="plan-card ${idx === 1 ? 'featured' : ''}">
            <h2 class="plan-name">${plan.name}</h2>
            <div class="plan-price">R$ ${parseFloat(plan.price_monthly).toFixed(2)}<span>/mês</span></div>
            <ul class="plan-features">
              <li>${plan.max_instances} Instância${plan.max_instances > 1 ? 's' : ''} WhatsApp</li>
              <li>${plan.max_flows} Fluxo${plan.max_flows > 1 ? 's' : ''} de Automação</li>
              <li>${plan.api_events_enabled ? 'API de Eventos Inclusa' : 'Sem API de Eventos'}</li>
              <li>Suporte Prioritário</li>
            </ul>
            <a href="checkout.html?plan=${plan.id}" class="btn ${idx === 1 ? 'primary' : ''}" style="width: 100%">Assinar ${plan.name}</a>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }
    loadHomePlans();
  </script>
</body>
</html>
